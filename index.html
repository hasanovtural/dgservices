<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mygov | Reqemsal Xidmet ve Melumatlar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e8edf5;
  --border:#e2e8f0;--border2:#cbd5e1;
  --tx:#0f172a;--tx2:#334155;--tx3:#64748b;--tx4:#94a3b8;
  --blue:#2563eb;--blue-s:#dbeafe;--blue-d:#1d4ed8;
  --indigo:#4f46e5;--violet:#7c3aed;--violet-s:#ede9fe;
  --green:#059669;--green-s:#d1fae5;
  --amber:#b45309;--amber-s:#fef3c7;
  --rose:#be123c;--rose-s:#ffe4e6;
  --cyan:#0e7490;--cyan-s:#cffafe;
  --orange:#c2410c;--orange-s:#ffedd5;
  --pink:#9d174d;--pink-s:#fce7f3;
  --teal:#0f766e;--teal-s:#ccfbf1;
  --r:8px;--r2:12px;
  --sh-s:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-m:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--blue);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.hdr{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.95);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border);padding:0 24px}
.hdr-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:16px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-mark{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.logo-mark span{font-size:17px;font-weight:900;color:#fff;letter-spacing:-1px;font-family:'Inter',sans-serif}
.logo-text{display:flex;flex-direction:column;gap:1px}
.logo-name{font-size:17px;font-weight:800;letter-spacing:-.6px;line-height:1}
.logo-name .my{color:var(--tx)}
.logo-name .gov{background:linear-gradient(90deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tagline{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase}
.hdr-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx3);font-family:'JetBrains Mono',monospace}
.hdr-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(5,150,105,.2)}

.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.stats-inner{max-width:1440px;margin:0 auto;display:flex;padding:10px 0}
.st{flex:0 0 auto;padding:10px 20px 10px 14px;display:flex;align-items:center;gap:12px;border-right:1px solid var(--border);cursor:default;transition:background .15s}
.st:last-child{border-right:none}
.st:hover{background:var(--surface2)}
.st.clickable{cursor:pointer}
.st.clickable:hover .st-num{color:var(--blue-d)}
.st-icon{width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.st-num{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1;transition:color .15s}
.st-lbl{font-size:11px;font-weight:500;color:var(--tx3);white-space:nowrap;margin-top:2px}

.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px}
.tabs-in{max-width:1440px;margin:0 auto;display:flex}
.tb{padding:14px 18px;font-size:13.5px;font-weight:600;color:var(--tx3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:8px}
.tb:hover{color:var(--tx2)}
.tb.on{color:var(--blue);border-bottom-color:var(--blue)}
.tb-cnt{font-size:11px;font-weight:700;background:var(--surface2);color:var(--tx3);padding:1px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace;transition:all .15s}
.tb.on .tb-cnt{background:var(--blue);color:#fff}

.mn{max-width:1440px;margin:0 auto;padding:20px 24px}
.pn{display:none}.pn.on{display:block}

.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.searchbox{flex:1;min-width:240px;max-width:420px;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 14px;transition:all .15s;box-shadow:var(--sh-s)}
.searchbox:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.searchbox input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:13.5px;font-family:inherit}
.searchbox input::placeholder{color:var(--tx4)}
.si{width:16px;height:16px;flex-shrink:0;color:var(--tx4)}

.fr{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center}
.fl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-right:2px;white-space:nowrap}
.ch{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.ch:hover{border-color:var(--border2);background:var(--surface2)}
.ch.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.2)}
.cg.on{background:var(--green);border-color:var(--green)}
.ca.on{background:var(--amber);border-color:var(--amber)}
.cv.on{background:var(--violet);border-color:var(--violet)}
.cp.on{background:var(--pink);border-color:var(--pink)}

.org-wrap{max-height:120px;overflow-y:auto;padding:2px 0;margin-bottom:10px}

.org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px}
@media(max-width:700px){.org-grid{grid-template-columns:1fr}}

.oc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh-s);transition:all .2s;animation:up .3s ease both}
.oc:hover{border-color:var(--border2);box-shadow:var(--sh-m);transform:translateY(-1px)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.oh{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .12s}
.oh:hover{background:var(--surface2)}
.oi{width:34px;height:34px;border-radius:var(--r);flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px}
.on2{flex:1;font-weight:600;font-size:13px;color:var(--tx);line-height:1.3}
.ocnt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--tx3);background:var(--surface2);padding:2px 8px;border-radius:20px;flex-shrink:0}
.oar{color:var(--tx4);font-size:10px;transition:transform .3s;flex-shrink:0}
.oc.open .oar{transform:rotate(180deg)}
.ob{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.oc.open .ob{max-height:6000px}
.obi{border-top:1px solid var(--border)}

.sv{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid rgba(0,0,0,.04);transition:background .1s;font-size:13px}
.sv:last-child{border-bottom:none}
.sv:hover{background:var(--surface2)}
.sn{flex:1;min-width:160px;color:var(--tx);line-height:1.4;padding-top:1px}
.sy{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx4);padding-top:3px;flex-shrink:0}

.tg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.ta{background:var(--green-s);color:var(--green)}
.ti{background:var(--amber-s);color:var(--amber)}
.tw{background:var(--violet-s);color:var(--violet)}
.tm{background:var(--pink-s);color:var(--pink)}
.tpdf{background:var(--rose-s);color:var(--rose)}
.tdoc{background:var(--teal-s);color:var(--teal)}
.tpnd{background:var(--orange-s);color:var(--orange)}
.tnone{background:var(--surface2);color:var(--tx4)}

.dc{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:800px){.dc{grid-template-columns:1fr}}
.dch{font-size:13px;font-weight:700;color:var(--tx2);display:flex;align-items:center;gap:8px;padding-bottom:10px;margin-bottom:12px;border-bottom:2px solid var(--border)}
.dch-cnt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;background:var(--surface2);color:var(--tx3);padding:1px 8px;border-radius:12px;margin-left:auto}
.dg{margin-bottom:10px;border-radius:var(--r2);border:1px solid var(--border);background:var(--surface);overflow:hidden;box-shadow:var(--sh-s)}
.dgt{font-size:12px;font-weight:700;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.dgtv{background:linear-gradient(90deg,rgba(79,70,229,.06),transparent);color:var(--indigo)}
.dgtm{background:linear-gradient(90deg,rgba(157,23,77,.06),transparent);color:var(--pink)}
.dgcnt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--tx3);background:var(--surface2);padding:1px 7px;border-radius:10px}
.di{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 14px;border-bottom:1px solid rgba(0,0,0,.04);font-size:12.5px;transition:background .1s}
.di:last-child{border-bottom:none}
.di:hover{background:var(--surface2)}
.din{flex:1;min-width:140px;color:var(--tx)}
.diq{font-size:11px;color:var(--tx3);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.diy{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx4);white-space:nowrap}

.fls{margin-bottom:20px}
.flh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.flt{font-size:15px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:10px}
.flt .b96{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;padding:3px 11px;border-radius:20px;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.flsrch{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:8px 12px;min-width:220px;transition:all .15s;box-shadow:var(--sh-s)}
.flsrch:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.flsrch input{background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--tx);width:100%}
.flsrch input::placeholder{color:var(--tx4)}
.flcnt{font-size:12px;color:var(--tx3);font-family:'JetBrains Mono',monospace;font-weight:500;margin-bottom:6px}

.flw{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh-s)}
.fls2{max-height:540px;overflow-y:auto}
.fltbl{width:100%;border-collapse:collapse;font-size:13px}
.fltbl thead th{background:var(--surface2);color:var(--tx2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:5;white-space:nowrap}
.fltbl thead th:first-child{width:44px;text-align:center}
.fltbl tbody tr{border-bottom:1px solid rgba(0,0,0,.045);transition:background .1s}
.fltbl tbody tr:last-child{border-bottom:none}
.fltbl tbody tr:hover{background:rgba(37,99,235,.04)}
.fltbl tbody tr:nth-child(even){background:rgba(0,0,0,.016)}
.fltbl tbody tr:nth-child(even):hover{background:rgba(37,99,235,.04)}
.fltbl td{padding:9px 14px;vertical-align:middle}
.flnum{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx4);text-align:center}
.flname{font-weight:500;color:var(--tx);line-height:1.4}
.flvtag,.flmtag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;white-space:nowrap;display:inline-block}
.florg{font-size:11.5px;color:var(--tx3);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flyr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx4);white-space:nowrap}

.empty{text-align:center;padding:40px 20px;color:var(--tx3);font-size:14px}
.empty-ico{font-size:28px;display:block;margin-bottom:8px}

@media(max-width:768px){.hdr{padding:0 14px}.mn{padding:14px}.stats-bar,.tabs{padding:0 14px}.st{padding:8px 12px}.st-num{font-size:17px}.florg,.flyr{display:none}.flsrch{min-width:160px}}

/* Loading & Error */
.loading{position:fixed;inset:0;background:rgba(248,250,252,.92);backdrop-filter:blur(8px);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading.hidden{display:none}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;font-weight:500;color:var(--tx3)}
.loading-sub{font-size:12px;color:var(--tx4)}
.err-box{background:var(--surface);border:1px solid var(--rose-s);border-radius:var(--r2);padding:20px 24px;text-align:center;max-width:400px;box-shadow:var(--sh-m)}
.err-ico{font-size:28px;margin-bottom:8px;display:block}
.err-ttl{font-size:15px;font-weight:700;color:var(--rose);margin-bottom:6px}
.err-msg{font-size:13px;color:var(--tx3);line-height:1.5}
.err-retry{margin-top:14px;padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.err-retry:hover{background:var(--blue-d)}
/* Last updated badge */
.last-upd{font-size:11px;color:var(--tx4);font-family:'JetBrains Mono',monospace;background:var(--surface2);border:1px solid var(--border);padding:2px 10px;border-radius:20px}
</style>
<style>
.lov{position:fixed;inset:0;background:rgba(248,250,252,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.lov.hidden{display:none}
.spin{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:14px;font-weight:500;color:#64748b}
.lsub{font-size:12px;color:#94a3b8}
.errbox{background:#fff;border:1px solid #fecdd3;border-radius:12px;padding:24px;text-align:center;max-width:380px}
.errttl{font-size:15px;font-weight:700;color:#be123c;margin-bottom:6px}
.errmsg{font-size:13px;color:#64748b;line-height:1.6}
.errbt{margin-top:14px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.exp-bar{background:#f8fafc;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;padding:10px 24px}
.exp-bar-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.exp-lbl{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.exp-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid #e2e8f0;background:#f8fafc;color:#334155;cursor:pointer;transition:all .15s;font-family:inherit}
.exp-btn:hover{background:#2563eb;border-color:#2563eb;color:#fff}
.exp-btn svg{width:14px;height:14px}
.lupd{font-size:11px;color:#94a3b8;font-family:"JetBrains Mono",monospace;background:#f1f5f9;border:1px solid #e2e8f0;padding:2px 10px;border-radius:20px}
</style>
</head>
<body>
<div class="lov" id="lov"><div class="spin"></div>
<div class="ltxt">Melumatlar yuklenir...</div>
<div class="lsub">Google Sheets-den oxunur</div></div>
<header class="hdr"><div class="hdr-in">
<a class="logo" href="#">
<div class="logo-mark"><span>mg</span></div>
<div class="logo-text">
<div class="logo-name"><span class="my">my</span><span class="gov">gov</span></div>
<div class="logo-tagline">Reqemsal Xidmet ve Melumatlar</div>
</div></a>
<span class="lupd" id="lupd">Yuklenir...</span>
</div></header>
<div class="stats-bar"><div class="stats-inner" id="sR"></div></div>
<div class="exp-bar">
  <div class="exp-bar-in">
    <span class="exp-lbl">Export:</span>
    <button class="exp-btn" onclick="exportSvc()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
      Xidmətlər (Excel)
    </button>
    <button class="exp-btn" onclick="exportData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
      Məlumatlar (Excel)
    </button>
    <button class="exp-btn" onclick="exportAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Hamısı (Excel)
    </button>
  </div>
</div>
<div class="tabs"><div class="tabs-in">
<button class="tb on" id="tbS" onclick="showS()">Xidmetler <span class="tb-cnt" id="tcs">-</span></button>
<button class="tb" id="tbD" onclick="showD()">Melumat ve Senedler <span class="tb-cnt" id="tcd">-</span></button>
</div></div>
<main class="mn">
<div class="pn on" id="ps">
<div class="toolbar"><div class="searchbox">
<svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
<input id="sQ" placeholder="Qurum ve ya xidmet axtar..." oninput="rS()">
</div></div>
<div class="fr" id="fF"></div>
<div class="fr" id="fP"></div>
<div class="fr org-wrap" id="fO"></div>
<div class="org-grid" id="sL"></div>
</div>
<div class="pn" id="pd">
<div class="toolbar"><div class="searchbox">
<svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
<input id="dQ" placeholder="Melumat ve ya kateqoriya axtar..." oninput="rD()">
</div></div>
<div class="fr" id="fV" style="max-height:110px;overflow-y:auto"></div>
<div class="fr" id="fM" style="max-height:110px;overflow-y:auto"></div>
<div class="fls"><div class="flh">
<div class="flt">Butun melumatlar <span class="b96" id="flBadge">-</span></div>
<div class="flsrch">
<svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
<input id="flQ" placeholder="Axtar..." oninput="filterFL()">
</div></div>
<div class="flcnt" id="flCnt"></div>
<div class="flw"><div class="fls2">
<table class="fltbl"><thead><tr>
<th>#</th><th>Melumat adi</th><th>VEB Kateqoriya</th><th>Mobil Kateqoriya</th><th>Qurum</th><th>Il</th><th>Sened</th>
</tr></thead><tbody id="flBody"></tbody></table>
</div></div></div>
<div class="dc" id="dC"></div>
</div>
</main>
<script>
var SHEET_ID = "1XPWJ-9uN4awNtiAMKGNv9aM-ya7-Q-7-";
var URL_SVC  = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&gid=1991950392";
var URL_DATA = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&gid=1088801224";

var S = [], D = [], ST = {};
var F  = {f:0, p:0, o:[]};
var DF = {v:-1, m:-1};
var VC = [], MC = [];

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getIcon(name) {
  var map = [
    ['Emek','&#127963;'],['Reqemsal','&#128663;'],['Secki','&#128499;'],
    ['Gomruk','&#128771;'],['Daxili','&#128737;'],['Elm','&#127891;'],
    ['Edliyye','&#9878;'],['dliyy','&#9878;'],['Sehiyye','&#127973;'],
    ['Statistika','&#128202;'],['Iqtisadiyyat','&#128176;'],['Arxiv','&#128218;'],
    ['Ekologiya','&#127807;'],['Eqli','&#128161;'],['Mudafie','&#128295;'],
    ['Energetika','&#9889;'],['Mirasiya','&#9992;'],['Prezident','&#129309;'],
    ['Xarici','&#127760;'],['Seferb','&#127894;'],['Azerisiq','&#128161;'],
    ['Insan','&#128100;'],['mbudsman','&#128100;'],['Imtahan','&#128221;'],
    ['Menzil','&#127959;'],['Ipoteka','&#127970;'],['Qida','&#127869;'],
    ['Aviasiya','&#9992;'],['Icra','&#127962;'],['Bank','&#127970;'],
    ['Su ','&#128167;'],['Azeriqaz','&#128293;'],['Diger','&#128230;']
  ];
  for (var i = 0; i < map.length; i++) {
    if (name.indexOf(map[i][0]) !== -1) return map[i][1];
  }
  return '&#127962;';
}

function tagF(f) {
  if (!f) return '';
  if (f.indexOf('API') !== -1) return '<span class="tg ta">API</span>';
  return '<span class="tg ti">Iframe</span>';
}

function tagP(p) {
  if (!p) return '';
  if (p.indexOf('Mobile') !== -1 || p.indexOf('mobile') !== -1) {
    return '<span class="tg tm">Mobile</span><span class="tg tw">Web</span>';
  }
  return '<span class="tg tw">Web</span>';
}

function tagD(p) {
  if (!p || p === '' || p === '-') return '';
  var pl = p.toLowerCase();
  if (pl.indexOf('pdf') !== -1) return '<span class="tg tpdf">PDF</span>';
  if (pl.indexOf('haz') !== -1 || pl.indexOf('sened') !== -1) return '<span class="tg tdoc">Sened</span>';
  if (pl.indexOf('deqiq') !== -1) return '<span class="tg tpnd">Pending</span>';
  if (pl === 'xeyr') return '<span class="tg tnone">-</span>';
  return '';
}

var VCS_KEYS = ['Sexsi melumatlarim','Aile melumatlarim','Emek ve maliyye melumatlarim','Tehsil melumatlarim','Neqliyyat melumatlarim','Tibbi melumatlarim','Herbi melumatlarim','Mecburi kockun melumatlarim','Elaqe melumatlarim','Diger melumatlarim'];
var VCS_VALS = ['background:#dbeafe;color:#1d4ed8','background:#fce7f3;color:#9d174d','background:#d1fae5;color:#065f46','background:#fef3c7;color:#92400e','background:#ede9fe;color:#5b21b6','background:#ffe4e6;color:#9f1239','background:#cffafe;color:#155e75','background:#ffedd5;color:#9a3412','background:#f3e8ff;color:#6b21a8','background:#f1f5f9;color:#475569'];

function vcs(v) {
  if (!v) return 'background:#f1f5f9;color:#475569';
  for (var i=0; i<VCS_KEYS.length; i++) {
    if (v.indexOf(VCS_KEYS[i].substring(0,5)) !== -1) return VCS_VALS[i];
  }
  return 'background:#f1f5f9;color:#475569';
}
function mcs(m) { return 'background:#f0f9ff;color:#0369a1'; }

function fetchSheet(url, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var raw = xhr.responseText;
        var json = raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1);
        cb(null, JSON.parse(json));
      } catch(e) { cb('Parse xetasi: ' + e.message, null); }
    } else { cb('HTTP ' + xhr.status, null); }
  };
  xhr.onerror = function() { cb('Sebeke xetasi', null); };
  xhr.send();
}

function parseServices(gviz) {
  var rows = gviz.table.rows;
  var orgs = {}, order = [], lastQurum = '';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (!r.c) continue;
    // Column B (index 1) only filled on first row of each org - track last seen
    if (r.c[1] && r.c[1].v) lastQurum = String(r.c[1].v).trim();
    var qurum = lastQurum;
    // Column D (index 3) = service name
    var name  = r.c[3] && r.c[3].v ? String(r.c[3].v).trim() : '';
    var form  = r.c[4] && r.c[4].v ? String(r.c[4].v).trim() : '';
    var plat  = r.c[5] && r.c[5].v ? String(r.c[5].v).trim() : '';
    var yrC = r.c[6]; var year = yrC && yrC.v ? (yrC.f || String(Math.round(yrC.v))) : '';
    // Skip header-like rows
    if (!qurum || !name) continue;
    if (name === 'Xidmetin adi' || name === 'Xidmətin adı' || name === 'Xidmətin adı ') continue;
    // Skip rows where form is not API or iframe (likely header/empty rows)
    if (form && form !== 'API' && form.indexOf('frame') === -1 && form.indexOf('İframe') === -1) continue;
    if (!orgs[qurum]) { orgs[qurum] = {name:qurum, icon:getIcon(qurum), svcs:[]}; order.push(qurum); }
    orgs[qurum].svcs.push({name:name, form:form, platform:plat, year:year});
  }
  var result = [];
  for (var i = 0; i < order.length; i++) result.push(orgs[order[i]]);
  return result;
}

function parseData(gviz) {
  var rows = gviz.table.rows, result = [];
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    if (!r.c || !r.c[1] || !r.c[1].v) continue;
    // Year is numeric in col F (index 5), use .f for formatted string
    var yrCell = r.c[5];
    var yr = '';
    if (yrCell && yrCell.v) yr = yrCell.f || String(Math.round(yrCell.v));
    // Service year in col G (index 6) for sheet1 is also numeric - same fix applied in parseServices
    result.push({
      name  : String(r.c[1].v).trim(),
      veb   : r.c[2] && r.c[2].v ? String(r.c[2].v).trim() : '',
      mob   : r.c[3] && r.c[3].v ? String(r.c[3].v).trim() : '',
      qurum : r.c[4] && r.c[4].v ? String(r.c[4].v).trim() : '',
      year  : yr,
      pdf   : r.c[6] && r.c[6].v ? String(r.c[6].v).trim() : ''
    });
  }
  return result;
}

function loadAll() {
  document.getElementById('lov').classList.remove('hidden');
  fetchSheet(URL_SVC, function(err, svc) {
    if (err) { showErr('Xidmetler: ' + err); return; }
    S = parseServices(svc);
    fetchSheet(URL_DATA, function(err2, dat) {
      if (err2) { showErr('Melumatlar: ' + err2); return; }
      D = parseData(dat);
      calcStats();
      buildUI();
      document.getElementById('lov').classList.add('hidden');
      var now = new Date();
      var p = function(n){ return n < 10 ? '0'+n : ''+n; };
      document.getElementById('lupd').textContent = p(now.getDate())+'.'+p(now.getMonth()+1)+'.'+now.getFullYear()+' '+p(now.getHours())+':'+p(now.getMinutes());
    });
  });
}

function showErr(msg) {
  document.getElementById('lov').innerHTML =
    '<div class="errbox">' +
    '<div class="errttl">Yukleme xetasi</div>' +
    '<div class="errmsg">' + msg + '</div>' +
    '<button class="errbt" onclick="location.reload()">Yeniden cehd et</button></div>';
}

function calcStats() {
  var total=0, api=0, ifr=0, veb=0, both=0, vapi=0, mob=0;
  for (var i=0; i<S.length; i++) {
    for (var j=0; j<S[i].svcs.length; j++) {
      var s = S[i].svcs[j]; total++;
      if (s.form && s.form.indexOf('API') !== -1) api++; else ifr++;
      if (s.platform === 'VEB') veb++;
      if (s.platform && s.platform.indexOf('Mobile') !== -1) { both++; mob++; }
      if (s.platform === 'VEB' && s.form && s.form.indexOf('API') !== -1) vapi++;
    }
  }
  ST = {total:total, api:api, ifr:ifr, veb:veb, both:both, vapi:vapi, mob:mob, data:D.length};
}

function buildUI() {
  var sc = [
    {c:'#0891b2',bg:'#ecfeff',v:ST.total, l:'Xidmet'},
    {c:'#059669',bg:'#d1fae5',v:ST.api,   l:'API'},
    {c:'#b45309',bg:'#fef3c7',v:ST.ifr,   l:'Iframe'},
    {c:'#7c3aed',bg:'#ede9fe',v:ST.veb,   l:'Yalniz VEB'},
    {c:'#be185d',bg:'#fce7f3',v:ST.both,  l:'VEB+Mobile'},
    {c:'#c2410c',bg:'#ffedd5',v:ST.vapi,  l:'VEB API'},
    {c:'#2563eb',bg:'#dbeafe',v:ST.mob,   l:'Mobile'},
    {c:'#dc2626',bg:'#ffe4e6',v:ST.data,  l:'Melumat', clk:true}
  ];
  var sh = '';
  for (var i=0; i<sc.length; i++) {
    var s = sc[i];
    if (s.clk) {
      sh += '<div class="st clickable" onclick="showD()">';
    } else {
      sh += '<div class="st">';
    }
    sh += '<div class="st-icon" style="background:' + s.bg + '">&#128196;</div>';
    sh += '<div class="st-body"><div class="st-num" style="color:' + s.c + '">' + s.v + '</div>';
    sh += '<div class="st-lbl">' + s.l + '</div></div></div>';
  }
  document.getElementById('sR').innerHTML = sh;
  document.getElementById('tcs').textContent = ST.total;
  document.getElementById('tcd').textContent = ST.data;
  document.getElementById('flBadge').textContent = D.length;
  document.getElementById('flCnt').textContent = D.length + ' melumat gosterilir';

  var ff = '<span class="fl">Inteqrasiya:</span>';
  ff += '<span class="ch cg on" onclick="setF(0,this)">Hamisi</span>';
  ff += '<span class="ch cg" onclick="setF(1,this)">API</span>';
  ff += '<span class="ch ca" onclick="setF(2,this)">Iframe</span>';
  document.getElementById('fF').innerHTML = ff;

  var fp = '<span class="fl">Platforma:</span>';
  fp += '<span class="ch on" onclick="setP(0,this)">Hamisi</span>';
  fp += '<span class="ch cp" onclick="setP(1,this)">VEB+Mobile</span>';
  fp += '<span class="ch cv" onclick="setP(2,this)">Yalniz VEB</span>';
  document.getElementById('fP').innerHTML = fp;

  var fo = '<span class="fl">Qurum:</span>';
  fo += '<span class="ch on" onclick="setO(-1,this)">Hamisi (' + S.length + ')</span>';
  for (var i=0; i<S.length; i++) {
    var nm = S[i].name.length > 28 ? S[i].name.substring(0,28) + '...' : S[i].name;
    fo += '<span class="ch" onclick="setO(' + i + ',this)">' + esc(nm) + '</span>';
  }
  document.getElementById('fO').innerHTML = fo;

  var seen = {}, vf = '<span class="fl">VEB:</span>';
  vf += '<span class="ch cv on" onclick="setV(-1,this)">Hamisi</span>';
  VC = [];
  for (var i=0; i<D.length; i++) {
    if (D[i].veb && !seen[D[i].veb]) { seen[D[i].veb]=1; VC.push(D[i].veb); }
  }
  VC.sort();
  for (var i=0; i<VC.length; i++) {
    vf += '<span class="ch cv" onclick="setV(' + i + ',this)">' + esc(VC[i]) + '</span>';
  }
  document.getElementById('fV').innerHTML = vf;

  seen = {};
  var mf = '<span class="fl">Mobile:</span>';
  mf += '<span class="ch cp on" onclick="setM(-1,this)">Hamisi</span>';
  MC = [];
  for (var i=0; i<D.length; i++) {
    if (D[i].mob && !seen[D[i].mob]) { seen[D[i].mob]=1; MC.push(D[i].mob); }
  }
  MC.sort();
  for (var i=0; i<MC.length; i++) {
    mf += '<span class="ch cp" onclick="setM(' + i + ',this)">' + esc(MC[i]) + '</span>';
  }
  document.getElementById('fM').innerHTML = mf;

  rS(); rD(); buildFL();
}

function showS() {
  document.getElementById('tbS').classList.add('on');
  document.getElementById('tbD').classList.remove('on');
  document.getElementById('ps').classList.add('on');
  document.getElementById('pd').classList.remove('on');
}
function showD() {
  document.getElementById('tbD').classList.add('on');
  document.getElementById('tbS').classList.remove('on');
  document.getElementById('pd').classList.add('on');
  document.getElementById('ps').classList.remove('on');
}

function setF(v,el) { F.f=v; mark(el); rS(); }
function setP(v,el) { F.p=v; mark(el); rS(); }
function setO(v, el) {
  if (v === -1) {
    F.o = [];
    var chips = el.parentElement.querySelectorAll('.ch');
    for (var i=0; i<chips.length; i++) chips[i].classList.remove('on');
    el.classList.add('on');
  } else {
    el.parentElement.querySelector('.ch').classList.remove('on');
    var idx = F.o.indexOf(v);
    if (idx === -1) { F.o.push(v); el.classList.add('on'); }
    else { F.o.splice(idx,1); el.classList.remove('on'); }
    if (F.o.length === 0) el.parentElement.querySelector('.ch').classList.add('on');
  }
  rS();
}
function setV(v,el) { DF.v=v; mark(el); rD(); }
function setM(v,el) { DF.m=v; mark(el); rD(); }

function mark(el) {
  var ch = el.parentElement.querySelectorAll('.ch');
  for (var i=0; i<ch.length; i++) ch[i].classList.remove('on');
  el.classList.add('on');
}

function rS() {
  var q = document.getElementById('sQ').value.toLowerCase().trim();
  var el = document.getElementById('sL');
  var html = '', n = 0;
  for (var i=0; i<S.length; i++) {
    var o = S[i];
    if (F.o.length > 0 && F.o.indexOf(i) === -1) continue;
    var fs = [];
    for (var j=0; j<o.svcs.length; j++) {
      var s = o.svcs[j];
      if (F.f === 1 && (!s.form || s.form.indexOf('API') === -1)) continue;
      if (F.f === 2 && s.form && s.form.indexOf('API') !== -1) continue;
      if (F.p === 1 && (!s.platform || s.platform.indexOf('Mobile') === -1)) continue;
      if (F.p === 2 && s.platform && s.platform.indexOf('Mobile') !== -1) continue;
      if (q && (o.name + ' ' + s.name).toLowerCase().indexOf(q) === -1) continue;
      fs.push(s);
    }
    if (!fs.length) continue;
    n++;
    var delay = Math.min(n * 20, 300);
    var rows = '';
    for (var j=0; j<fs.length; j++) {
      var s = fs[j];
      rows += '<div class="sv"><span class="sn">' + esc(s.name) + '</span>' +
              tagF(s.form) + ' ' + tagP(s.platform) +
              ' <span class="sy">' + esc(s.year) + '</span></div>';
    }
    html += '<div class="oc" style="animation-delay:' + delay + 'ms" id="oc' + i + '">' +
            '<div class="oh" onclick="tog(' + i + ')">' +
            '<div class="oi">' + o.icon + '</div>' +
            '<div class="on2">' + esc(o.name) + '</div>' +
            '<div class="ocnt">' + fs.length + '</div>' +
            '<div class="oar">&#9660;</div>' +
            '</div><div class="ob"><div class="obi">' + rows + '</div></div></div>';
  }
  el.innerHTML = html || '<div class="empty">Netice tapilamadi</div>';
}

function tog(i) {
  var el = document.getElementById('oc' + i);
  if (el) el.classList.toggle('open');
}

function rD() {
  var q = document.getElementById('dQ').value.toLowerCase().trim();
  var f = [];
  for (var i=0; i<D.length; i++) {
    var d = D[i];
    if (DF.v !== -1 && d.veb !== VC[DF.v]) continue;
    if (DF.m !== -1 && d.mob !== MC[DF.m]) continue;
    if (q && (d.name+' '+d.qurum+' '+d.veb+' '+d.mob).toLowerCase().indexOf(q) === -1) continue;
    f.push(d);
  }
  var vg={}, mg={}, vk=[], mk=[];
  for (var i=0; i<f.length; i++) {
    var d = f[i];
    if (d.veb) { if (!vg[d.veb]) { vg[d.veb]=[]; vk.push(d.veb); } vg[d.veb].push(d); }
    if (d.mob) { if (!mg[d.mob]) { mg[d.mob]=[]; mk.push(d.mob); } mg[d.mob].push(d); }
  }
  vk.sort(); mk.sort();
  var vcnt = 0; for (var i=0;i<f.length;i++) if(f[i].veb) vcnt++;
  var mcnt = 0; for (var i=0;i<f.length;i++) if(f[i].mob) mcnt++;
  var lh = '<div class="dch">VEB Kateqoriyalari <span class="dch-cnt">' + vcnt + '</span></div>';
  if (!vk.length) lh += '<div class="empty">Netice yoxdur</div>';
  else for (var i=0; i<vk.length; i++) {
    var k=vk[i], rows='';
    for (var j=0; j<vg[k].length; j++) {
      var d=vg[k][j];
      rows += '<div class="di"><span class="din">' + esc(d.name) + '</span>' + tagD(d.pdf) +
              '<span class="diq">' + esc(d.qurum) + '</span><span class="diy">' + esc(d.year) + '</span></div>';
    }
    lh += '<div class="dg"><div class="dgt dgtv">' + esc(k) + '<span class="dgcnt">' + vg[k].length + '</span></div>' + rows + '</div>';
  }
  var rh = '<div class="dch">Mobile Kateqoriyalari <span class="dch-cnt">' + mcnt + '</span></div>';
  if (!mk.length) rh += '<div class="empty">Netice yoxdur</div>';
  else for (var i=0; i<mk.length; i++) {
    var k=mk[i], rows='';
    for (var j=0; j<mg[k].length; j++) {
      var d=mg[k][j];
      rows += '<div class="di"><span class="din">' + esc(d.name) + '</span>' + tagD(d.pdf) +
              '<span class="diq">' + esc(d.qurum) + '</span><span class="diy">' + esc(d.year) + '</span></div>';
    }
    rh += '<div class="dg"><div class="dgt dgtm">' + esc(k) + '<span class="dgcnt">' + mg[k].length + '</span></div>' + rows + '</div>';
  }
  document.getElementById('dC').innerHTML = '<div>' + lh + '</div><div>' + rh + '</div>';
}

function buildFL() {
  var rows = '';
  for (var i=0; i<D.length; i++) {
    var d = D[i];
    rows += '<tr class="flr"' +
            ' data-n="' + esc(d.name).toLowerCase() + '"' +
            ' data-v="' + esc(d.veb||'').toLowerCase() + '"' +
            ' data-m="' + esc(d.mob||'').toLowerCase() + '"' +
            ' data-o="' + esc(d.qurum||'').toLowerCase() + '">' +
            '<td class="flnum">' + (i+1) + '</td>' +
            '<td class="flname">' + esc(d.name) + '</td>' +
            '<td><span class="flvtag" style="' + vcs(d.veb) + '">' + esc(d.veb||'') + '</span></td>' +
            '<td><span class="flmtag" style="background:#f0fdf4;color:#15803d">' + esc(d.mob||'') + '</span></td>' +
            '<td class="florg">' + esc(d.qurum||'') + '</td>' +
            '<td class="flyr">' + esc(d.year||'') + '</td>' +
            '<td>' + tagD(d.pdf) + '</td></tr>';
  }
  document.getElementById('flBody').innerHTML = rows;
}

function filterFL() {
  var q = document.getElementById('flQ').value.toLowerCase().trim();
  var rows = document.querySelectorAll('.flr');
  var vis = 0;
  for (var i=0; i<rows.length; i++) {
    var r = rows[i];
    var show = !q || r.dataset.n.indexOf(q)!==-1 || r.dataset.v.indexOf(q)!==-1 || r.dataset.m.indexOf(q)!==-1 || r.dataset.o.indexOf(q)!==-1;
    r.style.display = show ? '' : 'none';
    if (show) vis++;
  }
  document.getElementById('flCnt').textContent = vis + ' melumat gosterilir';
}

function exportSvc() {
  if (!S.length) { alert('Melumat hələ yüklənməyib!'); return; }
  var rows = [['No', 'Qurum', 'Xidmet adi', 'Inteqrasiya formasi', 'Platforma', 'Il']];
  var n = 1;
  for (var i = 0; i < S.length; i++) {
    for (var j = 0; j < S[i].svcs.length; j++) {
      var s = S[i].svcs[j];
      rows.push([n++, S[i].name, s.name, s.form, s.platform, s.year]);
    }
  }
  writeExcel([{name:'Xidmetler', data:rows}], 'mygov_xidmetler.xlsx');
}

function exportData() {
  if (!D.length) { alert('Melumat hələ yüklənməyib!'); return; }
  var rows = [['No', 'Melumat adi', 'VEB Kateqoriya', 'Mobil Kateqoriya', 'Qurum', 'Il', 'PDF/Share']];
  for (var i = 0; i < D.length; i++) {
    var d = D[i];
    rows.push([i+1, d.name, d.veb, d.mob, d.qurum, d.year, d.pdf]);
  }
  writeExcel([{name:'Melumatlar', data:rows}], 'mygov_melumatlar.xlsx');
}

function exportAll() {
  if (!S.length || !D.length) { alert('Melumat hələ yüklənməyib!'); return; }
  var svcRows = [['No', 'Qurum', 'Xidmet adi', 'Inteqrasiya formasi', 'Platforma', 'Il']];
  var n = 1;
  for (var i = 0; i < S.length; i++) {
    for (var j = 0; j < S[i].svcs.length; j++) {
      var s = S[i].svcs[j];
      svcRows.push([n++, S[i].name, s.name, s.form, s.platform, s.year]);
    }
  }
  var dataRows = [['No', 'Melumat adi', 'VEB Kateqoriya', 'Mobil Kateqoriya', 'Qurum', 'Il', 'PDF/Share']];
  for (var i = 0; i < D.length; i++) {
    var d = D[i];
    dataRows.push([i+1, d.name, d.veb, d.mob, d.qurum, d.year, d.pdf]);
  }
  writeExcel([
    {name:'Xidmetler', data:svcRows},
    {name:'Melumatlar', data:dataRows}
  ], 'mygov_full_export.xlsx');
}

function writeExcel(sheets, filename) {
  var wb = XLSX.utils.book_new();
  for (var i = 0; i < sheets.length; i++) {
    var ws = XLSX.utils.aoa_to_sheet(sheets[i].data);
    var wscols = [];
    for (var j = 0; j < sheets[i].data[0].length; j++) {
      var maxLen = 10;
      for (var r = 0; r < Math.min(sheets[i].data.length, 50); r++) {
        var val = sheets[i].data[r][j] ? String(sheets[i].data[r][j]) : '';
        if (val.length > maxLen) maxLen = val.length;
      }
      wscols.push({wch: Math.min(maxLen + 2, 60)});
    }
    ws['!cols'] = wscols;
    XLSX.utils.book_append_sheet(wb, ws, sheets[i].name);
  }
  XLSX.writeFile(wb, filename);
}

loadAll();

</script>
