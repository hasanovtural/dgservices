*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}

.hdr{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.95);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border);padding:0 24px}
.hdr-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:16px}

.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.stats-inner{max-width:1440px;margin:0 auto;display:flex;padding:10px 0}

.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px}

.tb{padding:14px 18px;font-size:13.5px;font-weight:600;color:var(--tx3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:8px}

.oh{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .12s}

.tg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;flex-shrink:0}

.flsrch{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:8px 12px;min-width:220px;transition:all .15s;box-shadow:var(--sh-s)}
.flsrch:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

.flcnt{font-size:12px;color:var(--tx3);font-family:'JetBrains Mono',monospace;font-weight:500;margin-bottom:6px}

.flw{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh-s)}

.flyr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx4);white-space:nowrap}

</style>

function rS(){

      if(F.f!=='all'&&s.form!==F.f) continue;

    for(var j=0;j<vg[k].length;j++){
      var d=vg[k][j];
      rows+='<div class="di"><span class="din">'+esc(d.name)+'</span>'+tagD(d.pdf)+'<span class="diq">'+esc(d.qurum)+'</span><span class="diy">'+d.year+'</span></div>';
    }
    lh+='<div class="dg"><div class="dgt dgtv">'+esc(k)+'<span class="dgcnt">'+vg[k].length+'</span></div>'+rows+'</div>';
  }
  var rh='<div class="dch">📱 Mobile Kateqoriyaları <span class="dch-cnt">'+f.filter(function(d){return d.mob;}).length+'</span></div>';
  if(!mk.length) rh+='<div class="empty"><span class="empty-ico">📭</span>Nəticə yoxdur</div>';
  else for(var i=0;i<mk.length;i++){
    var k=mk[i], rows='';
    for(var j=0;j<mg[k].length;j++){
      var d=mg[k][j];
      rows+='<div class="di"><span class="din">'+esc(d.name)+'</span>'+tagD(d.pdf)+'<span class="diq">'+esc(d.qurum)+'</span><span class="diy">'+d.year+'</span></div>';
    }
    rh+='<div class="dg"><div class="dgt dgtm">'+esc(k)+'<span class="dgcnt">'+mg[k].length+'</span></div>'+rows+'</div>';
  }
  document.getElementById('dC').innerHTML='<div>'+lh+'</div><div>'+rh+'</div>';
}

function buildFL(){
  var rows='';
  for(var i=0;i<D.length;i++){
    var d=D[i];
    var vs=vcs(d.veb), ms=mcs(d.mob);
    rows+='<tr class="flr"'
      +' data-n="'+esc(d.name).toLowerCase()+'"'
      +' data-v="'+(d.veb||'').toLowerCase()+'"'
      +' data-m="'+(d.mob||'').toLowerCase()+'"'
      +' data-o="'+(d.qurum||'').toLowerCase()+'">'
      +'<td class="flnum">'+(i+1)+'</td>'
      +'<td class="flname">'+esc(d.name)+'</td>'
      +'<td><span class="flvtag" style="'+vs+'">'+esc(d.veb||'')+'</span></td>'
      +'<td><span class="flmtag" style="'+ms+'">'+esc(d.mob||'')+'</span></td>'
      +'<td class="florg">'+esc(d.qurum||'')+'</td>'
      +'<td class="flyr">'+(d.year||'')+'</td>'
      +'<td>'+tagD(d.pdf)+'</td>'
      +'</tr>';
  }
  document.getElementById('flBody').innerHTML=rows;
}

function filterFL(){
  var q=document.getElementById('flQ').value.toLowerCase().trim();
  var rows=document.querySelectorAll('.flr');
  var vis=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var show=!q||r.dataset.n.includes(q)||r.dataset.v.includes(q)||r.dataset.m.includes(q)||r.dataset.o.includes(q);
    r.style.display=show?'':'none';
    if(show) vis++;
  }
  document.getElementById('flCnt').textContent=vis+' məlumat göstərilir';
}

init();
</script>
</body>
